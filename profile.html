<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>BΩNG house — Profil</title>
    <link rel="icon" type="image/png" href="/images/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
    <link rel="shortcut icon" href="/images/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png" />
    <link rel="manifest" href="/images/site.webmanifest" />
    <link rel="stylesheet" href="styles.css">
    <script>
        if (!localStorage.getItem('saldo_user')) window.location.replace('login.html');
    </script>
</head>
<body>
    <script type="module" src="profile.js"></script>

    <header class="top-bar">
        <a href="index.html" class="back-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            Hem
        </a>
        <span class="top-bar-title">B<span>Ω</span>NG house</span>
        <div style="width:70px"></div>
    </header>

    <div class="container subpage-container">

        <div class="subpage-header">
            <h1 class="subpage-title">Profil</h1>
        </div>

        <!-- Who you are -->
        <div class="section-card profile-identity-card">
            <div class="profile-avatar" id="profileAvatar"></div>
            <div class="profile-identity-info">
                <div class="profile-name" id="profileName">—</div>
                <div class="profile-role" id="profileRole"></div>
            </div>
        </div>

        <!-- Change password -->
        <div class="section-card">
            <div class="section-card-header">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                Byt lösenord
            </div>
            <form id="changePasswordForm" class="profile-pw-form">
                <div class="form-field">
                    <label class="field-label" for="oldPassword">Nuvarande lösenord</label>
                    <input type="password" id="oldPassword" class="field-input" placeholder="••••••••" autocomplete="current-password">
                </div>
                <div class="form-field">
                    <label class="field-label" for="newPassword">Nytt lösenord</label>
                    <input type="password" id="newPassword" class="field-input" placeholder="••••••••" autocomplete="new-password">
                </div>
                <div class="form-field">
                    <label class="field-label" for="confirmPassword">Bekräfta nytt lösenord</label>
                    <input type="password" id="confirmPassword" class="field-input" placeholder="••••••••" autocomplete="new-password">
                </div>
                <div id="pwFeedback" class="profile-feedback" style="display:none;"></div>
                <button type="submit" class="btn btn-primary btn-submit" id="savePwBtn">Spara lösenord</button>
            </form>
        </div>

        <!-- Logout -->
        <button class="btn btn-secondary profile-logout-btn"
            onclick="localStorage.removeItem('saldo_user'); window.location.replace('login.html');">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Logga ut
        </button>
    </div>

    <div id="portrait-lock">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
        <p>Rotera till stående läge</p>
    </div>
    <script>
        if (screen.orientation && screen.orientation.lock) screen.orientation.lock('portrait').catch(() => {});
    </script>
</body>
</html>
