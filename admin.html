<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>BΩNG house — Admin</title>
    <link rel="icon" type="image/png" href="/images/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
    <link rel="shortcut icon" href="/images/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png" />
    <link rel="manifest" href="/images/site.webmanifest" />
    <link rel="stylesheet" href="styles.css">
    <script>
        const user = localStorage.getItem('saldo_user');
        if (!user) window.location.replace('login.html');
        if (user !== 'David') window.location.replace('index.html');
    </script>
</head>
<body>
    <script type="module" src="admin.js"></script>

    <header class="top-bar">
        <a href="index.html" class="back-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            Hem
        </a>
        <span class="top-bar-title">B<span>Ω</span>NG house</span>
        <div style="width:70px"></div>
    </header>

    <div class="container subpage-container">

        <div class="subpage-header">
            <h1 class="subpage-title">Admin</h1>
            <span class="admin-badge">David</span>
        </div>

        <!-- Set starting balance -->
        <div class="section-card">
            <div class="section-card-header">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                Startsaldo
            </div>
            <p class="admin-desc">Nuvarande startsaldo: <strong id="currentStartingBalance">Laddar…</strong></p>
            <form id="balanceForm" class="admin-form">
                <div class="form-field">
                    <label class="field-label" for="newBalanceInput">Nytt startsaldo (kr)</label>
                    <input type="number" id="newBalanceInput" class="field-input" placeholder="0.00" step="0.01" required>
                </div>
                <button type="submit" class="btn btn-primary btn-submit">Uppdatera startsaldo</button>
            </form>
        </div>

        <!-- Reset purchases -->
        <div class="section-card">
            <div class="section-card-header">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.85"/></svg>
                Nollställ månaden
            </div>
            <p class="admin-desc">Raderar alla utgifter och nollställer skulder. Startsaldot påverkas inte. <strong>Kan inte ångras.</strong></p>
            <button id="resetPurchasesBtn" class="btn btn-danger btn-submit">Rensa alla utgifter</button>
        </div>

        <!-- Feedback -->
        <div id="adminFeedback" class="profile-feedback" style="display:none;"></div>

    </div>


    <!-- Shared app modal (used by modal.js instead of alert/confirm) -->
    <div id="appModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2 id="appModalTitle">Meddelande</h2>
            </div>
            <div class="modal-body">
                <p id="appModalMessage" style="color:var(--text-dim);font-size:14px;line-height:1.6;"></p>
            </div>
            <div class="modal-footer">
                <button id="appModalCancel" class="btn btn-secondary">Avbryt</button>
                <button id="appModalConfirm" class="btn btn-primary">OK</button>
            </div>
        </div>
    </div>

    <div id="portrait-lock">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
        <p>Rotera till stående läge</p>
    </div>
    <script>
        if (screen.orientation && screen.orientation.lock) screen.orientation.lock('portrait').catch(() => {});
    </script>
</body>
</html>
