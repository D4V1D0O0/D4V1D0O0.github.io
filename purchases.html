<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>BΩNG house — Utgifter</title>
    <link rel="icon" type="image/png" href="/images/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
    <link rel="shortcut icon" href="/images/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png" />
    <link rel="manifest" href="/images/site.webmanifest" />
    <link rel="stylesheet" href="styles.css">
    <script>
        if (!localStorage.getItem('saldo_user')) window.location.replace('login.html');
    </script>
</head>
<body>
    <script type="module" src="script.js"></script>

    <header class="top-bar">
        <a href="index.html" class="back-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            Hem
        </a>
        <span class="top-bar-title">B<span>Ω</span>NG house</span>
        <div style="width:70px"></div><!-- spacer to centre title -->
    </header>

    <div class="container subpage-container">

        <div class="subpage-header">
            <h1 class="subpage-title">Utgifter</h1>
        </div>

        <!-- Donut chart -->
        <div class="section-card donut-card">
            <div class="donut-wrap">
                <svg class="donut-svg" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                    <!-- Background track -->
                    <circle class="donut-track" cx="60" cy="60" r="48"/>
                    <!-- Spent arc — dasharray updated by JS -->
                    <circle class="donut-spent" id="donutSpentArc" cx="60" cy="60" r="48"
                        stroke-dasharray="0 302"
                        stroke-dashoffset="75.5"/>
                </svg>
                <div class="donut-center">
                    <span class="donut-pct" id="donutPct">0%</span>
                    <span class="donut-label">spenderat</span>
                </div>
            </div>
            <div class="donut-legend">
                <div class="donut-legend-item">
                    <span class="donut-legend-dot donut-legend-dot-spent"></span>
                    <div class="donut-legend-text">
                        <span class="donut-legend-label">Spenderat</span>
                        <span class="donut-legend-value" id="donutSpentAmt">— kr</span>
                    </div>
                </div>
                <div class="donut-legend-item">
                    <span class="donut-legend-dot donut-legend-dot-left"></span>
                    <div class="donut-legend-text">
                        <span class="donut-legend-label">Kvar</span>
                        <span class="donut-legend-value" id="donutLeftAmt">— kr</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="section-card" style="flex-shrink:0;">
            <div class="section-card-header">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                Skulder till kontot
            </div>
            <div id="debtsSummary" class="debts-list">Laddar...</div>
        </div>

        <div class="section-card entries-card">
            <div class="section-card-header">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                Alla utgifter
            </div>
            <div id="entriesList" class="entries-list"></div>
        </div>

        <!-- Edit modal -->
        <div id="editEntryModal" class="modal-overlay">
            <div class="modal">
                <div class="modal-header">
                    <h2>Redigera utgift</h2>
                    <button class="modal-close-btn" id="editCancelBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
                <div class="modal-body">
                    <form id="editEntryForm">
                        <div class="form-field">
                            <label class="field-label" for="editItemInput">Vad köpte du?</label>
                            <input type="text" id="editItemInput" class="field-input" required>
                        </div>
                        <div class="form-field">
                            <label class="field-label" for="editTotalAmountInput">Totalbelopp</label>
                            <input type="number" id="editTotalAmountInput" class="field-input" step="0.01" min="0" required>
                        </div>
                        <div class="form-field">
                            <label class="field-label" for="editPersonalAmountInput">Privat del</label>
                            <input type="number" id="editPersonalAmountInput" class="field-input" step="0.01" min="0">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button id="editDeleteBtn" class="btn btn-danger">Radera</button>
                    <button id="editSaveBtn" class="btn btn-primary">Spara</button>
                </div>
            </div>
        </div>

    </div>


    <!-- Shared app modal (used by modal.js instead of alert/confirm) -->
    <div id="appModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2 id="appModalTitle">Meddelande</h2>
            </div>
            <div class="modal-body">
                <p id="appModalMessage" style="color:var(--text-dim);font-size:14px;line-height:1.6;"></p>
            </div>
            <div class="modal-footer">
                <button id="appModalCancel" class="btn btn-secondary">Avbryt</button>
                <button id="appModalConfirm" class="btn btn-primary">OK</button>
            </div>
        </div>
    </div>

    <div id="portrait-lock">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
        <p>Rotera till stående läge</p>
    </div>
    <script>
        if (screen.orientation && screen.orientation.lock) screen.orientation.lock('portrait').catch(() => {});
    </script>
</body>
</html>
