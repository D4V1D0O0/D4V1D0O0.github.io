<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>BΩNG house</title>
    <link rel="icon" type="image/png" href="/images/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
    <link rel="shortcut icon" href="/images/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png" />
    <link rel="manifest" href="/images/site.webmanifest" />
    <link rel="stylesheet" href="styles.css">
    <script>
        if (!localStorage.getItem('saldo_user')) window.location.replace('login.html');
    </script>
</head>
<body>
    <!-- script.js only to load balance onto the home page -->
    <script type="module" src="script.js"></script>

    <!-- Load leaderboard preview from chores data -->
    <script type="module">
        import { db } from './firebase.js';
        import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

        const ALL_USERS = ['David', 'Julius', 'Alvin'];
        const MEDALS    = ['🥇', '🥈', '🥉'];
        const currentUser = localStorage.getItem('saldo_user') || '';

        onSnapshot(doc(db, 'Saldo', 'Chores'), (snap) => {
            const el = document.getElementById('homeLeaderboard');
            if (!el) return;

            const scores = snap.exists() ? (snap.data().scores || {}) : {};
            const sorted = ALL_USERS
                .map(name => ({ name, pts: scores[name] || 0 }))
                .filter(user => user.pts > 0)
                .sort((a, b) => b.pts - a.pts);

            el.innerHTML = '';

            if (sorted.length === 0) {
                el.innerHTML = '<span style="color:var(--text-muted);font-size:12px;">Ingen har poäng ännu</span>';
                return;
            }

            sorted.forEach((user, i) => {
                const isMe = user.name === currentUser;
                const row  = document.createElement('div');
                row.className = `home-lb-row${isMe ? ' home-lb-row-me' : ''}`;
                row.innerHTML = `
                    <span class="home-lb-medal">${MEDALS[i] || ''}</span>
                    <span class="home-lb-name">${user.name}</span>
                    <span class="home-lb-pts">${user.pts}<span class="home-lb-pts-unit">p</span></span>
                `;
                el.appendChild(row);
            });
        });

        function todayStr() {
            return new Date().toISOString().slice(0, 10);
        }

        function formatDateShort(dateStr) {
            const d = new Date(dateStr + 'T12:00:00');
            return d.toLocaleDateString('sv-SE', { weekday: 'short', day: 'numeric', month: 'short' });
        }

        onSnapshot(doc(db, 'Saldo', 'Laundry'), (snap) => {
            const timeEl = document.getElementById('laundryNextTime');
            const infoEl = document.getElementById('laundryNextInfo');
            if (!timeEl || !infoEl) return;

            const bookings = snap.exists() ? (snap.data().bookings || []) : [];
            const today    = todayStr();

            // Candidate bookings visible to the current user:
            //   1. Bookings the user owns (regardless of open/private)
            //   2. Bookings the user has joined
            //   3. Open bookings from others
            // Private bookings from OTHER users are NOT shown.
            const visible = bookings
                .filter(b => b.date >= today)
                .filter(b =>
                    b.bookedBy === currentUser ||
                    (b.participants || []).includes(currentUser) ||
                    b.open === true
                )
                .sort((a, b) => {
                    if (a.date !== b.date) return a.date.localeCompare(b.date);
                    return a.slot.localeCompare(b.slot);
                });

            // Prefer user's own booking first, then any open one
            const next = visible.find(b =>
                b.bookedBy === currentUser ||
                (b.participants || []).includes(currentUser)
            ) || visible[0];

            if (!next) {
                timeEl.textContent = 'Ingen bokad tid';
                infoEl.textContent = '';
                return;
            }

            timeEl.textContent = `${formatDateShort(next.date)} · ${next.slot}`;

            const isOwn = next.bookedBy === currentUser || (next.participants || []).includes(currentUser);
            if (isOwn) {
                infoEl.textContent = `Din tid · ${next.open ? 'Öppen' : 'Privat'}`;
            } else {
                const parts = [next.bookedBy, ...(next.participants || [])];
                infoEl.textContent = `${parts.join(', ')} · Öppen`;
            }
        });
    </script>

    <header class="top-bar">

    </header>

            <div class="laundry-row">

                    <div class="laundry-user" id="laundryNextInfo"></div>
                </div>
                <a href="laundry.html" class="laundry-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/></svg>

        </div>

            <a href="shopping.html" class="grid-tile">

            <a href="chores.html" class="grid-tile grid-tile-chores">

                    </svg>

                <span class="grid-tile-sub">Poängliga</span>
            </a>

            <!-- Admin tile — only visible to David, shown/hidden by JS below -->
            <a href="admin.html" class="grid-tile grid-tile-admin" id="adminTile" style="display:none;">
                <div class="grid-tile-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>

    <script>
        // Show admin tile only for David, show name in top bar
        const _u = localStorage.getItem('saldo_user') || '';
        const _topName = document.getElementById('topBarUserName');
        if (_topName && _u) _topName.textContent = _u;
        if (_u === 'David') {
            const _t = document.getElementById('adminTile');
            if (_t) _t.style.display = '';
        }
    </script>

    <div id="portrait-lock">

    </div>
    <script>
        if (screen.orientation && screen.orientation.lock) screen.orientation.lock('portrait').catch(() => {});
    </script>
</body>
