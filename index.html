<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>BΩNG house - Saldo</title>
    <link rel="icon" type="image/png" href="/images/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
    <link rel="shortcut icon" href="/images/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png" />
    <link rel="manifest" href="/images/site.webmanifest" />
    <link rel="stylesheet" href="styles.css">

    <!-- Auth guard: redirect to login if not authenticated -->
    <script>
        (function () {
            if (!localStorage.getItem('saldo_user')) {
                window.location.replace('login.html');
            }
        })();
    </script>
</head>
<body>
    <script type="module" src="script.js"></script>
    <script type="module" src="swish.js"></script>

    <!-- Splash screen -->
    <div id="splash">
        <img src="images/web-app-manifest-512x512.png" alt="Loading">
    </div>

    <!-- Top bar -->
    <header class="top-bar">
        <div class="top-bar-brand">
            <img src="images/web-app-manifest-512x512.png" alt="logo" class="top-bar-logo">
            <span class="top-bar-title">B<span>Ω</span>NG house</span>
        </div>
        <button class="logout-btn" onclick="localStorage.removeItem('saldo_user'); window.location.replace('login.html');">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Logga ut
        </button>
    </header>

    <!-- Main content area -->
    <div class="container">

        <!-- TAB: SALDO -->
        <section class="tab active" id="tab-saldo">
            <div class="balance-card">
                <div class="balance-label">Aktuellt Saldo</div>
                <div class="balance-value" id="balance">Laddar...</div>
                <div class="balance-starting" id="startingBalance">Startsaldo: Laddar...</div>
            </div>

            <div class="section-card">
                <div class="section-card-header">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                    Skulder till kontot
                </div>
                <div id="debtsSummary" class="debts-list">Laddar...</div>
            </div>

            <div class="section-card entries-card">
                <div class="section-card-header">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                    Utgifter
                </div>
                <div id="entriesList" class="entries-list"></div>
            </div>
        </section>

        <!-- TAB: SKULDER -->
        <section class="tab" id="tab-debts">
            <div class="tab-page-label">Betala skuld</div>

            <div class="swish-user-banner">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Inloggad som <strong id="swishCurrentUser">—</strong>
            </div>

            <div class="section-card swish-card">
                <label class="field-label">
                    Betala till
                    <select id="receiverSelect" class="field-input"></select>
                </label>
                <div class="swish-amount-row">
                    <span class="swish-amount-label">Din skuld</span>
                    <span class="swish-amount-value"><span id="amountText">0.00</span> kr</span>
                </div>
                <p id="swishNoDebt" class="swish-no-debt" style="display:none;">Inga skulder att betala &#127881;</p>
                <button id="payBtn" class="btn btn-primary swish-pay-btn">
                    Betala med
                    <img src="images/swish-logo.svg" alt="Swish" height="18">
                </button>
            </div>

            <!-- hidden — kept for swish.js compatibility -->
            <select id="meSelect" style="display:none;"></select>
        </section>

        <!-- TAB: LÄGG TILL -->
        <section class="tab" id="tab-add">
            <div class="tab-page-label">Lägg till</div>

            <div class="form-toggle-container">
                <button type="button" id="toggleToExpense" class="form-type-btn active">Utgift</button>
                <button type="button" id="toggleToDebt" class="form-type-btn">Skuld</button>
            </div>

            <div class="add-form-scroll">
                <form id="expenseForm" class="add-form active">
                    <div class="form-field">
                        <label class="field-label" for="itemInput">Vad köptes?</label>
                        <input type="text" id="itemInput" class="field-input" placeholder="T.ex. Matvaror" required>
                    </div>
                    <div class="form-field">
                        <label class="field-label" for="totalAmountInput">Totalbelopp</label>
                        <input type="number" id="totalAmountInput" class="field-input" placeholder="0.00" step="0.01" min="0" required>
                    </div>
                    <div class="form-field">
                        <label class="field-label" for="personalAmountInput">Privat del <span class="field-hint">(valfritt)</span></label>
                        <input type="number" id="personalAmountInput" class="field-input" placeholder="0.00" step="0.01" min="0">
                    </div>
                    <div class="form-field">
                        <label class="field-label" for="payerSelect">Vem betalade?</label>
                        <select id="payerSelect" class="field-input" required>
                            <option value="" disabled selected>Välj person</option>
                            <option value="David">David</option>
                            <option value="Julius">Julius</option>
                            <option value="Alvin">Alvin</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary btn-submit">Lägg till utgift</button>
                </form>

                <form id="debtForm" class="add-form">
                    <div class="swish-user-banner">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        Lägger till skuld som <strong id="debtCurrentUser">—</strong>
                    </div>
                    <!-- hidden — kept for script.js compatibility -->
                    <select id="debtTo" style="display:none;"></select>
                    <div class="form-field">
                        <label class="field-label" for="debtFrom">Vem är skyldig dig?</label>
                        <select id="debtFrom" class="field-input" required>
                            <option value="" disabled selected>Välj person</option>
                            <option value="David">David</option>
                            <option value="Julius">Julius</option>
                            <option value="Alvin">Alvin</option>
                        </select>
                    </div>
                    <div class="form-field">
                        <label class="field-label" for="debtAmount">Belopp</label>
                        <input type="number" id="debtAmount" class="field-input" placeholder="0.00" step="0.01" min="0" required>
                    </div>
                    <div class="form-field">
                        <label class="field-label" for="debtMessage">Meddelande</label>
                        <input type="text" id="debtMessage" class="field-input" placeholder="T.ex. el för mars" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-submit">Lägg till skuld</button>
                </form>
            </div>
        </section>

        <!-- Edit Entry Modal -->
        <div id="editEntryModal" class="modal-overlay">
            <div class="modal">
                <div class="modal-header">
                    <h2>Redigera utgift</h2>
                    <button class="modal-close-btn" id="editCancelBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
                <div class="modal-body">
                    <form id="editEntryForm">
                        <div class="form-field">
                            <label class="field-label" for="editItemInput">Vad köpte du?</label>
                            <input type="text" id="editItemInput" class="field-input" required>
                        </div>
                        <div class="form-field">
                            <label class="field-label" for="editTotalAmountInput">Totalbelopp</label>
                            <input type="number" id="editTotalAmountInput" class="field-input" step="0.01" min="0" required>
                        </div>
                        <div class="form-field">
                            <label class="field-label" for="editPersonalAmountInput">Privat del</label>
                            <input type="number" id="editPersonalAmountInput" class="field-input" step="0.01" min="0">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button id="editDeleteBtn" class="btn btn-danger">Radera</button>
                    <button id="editSaveBtn" class="btn btn-primary">Spara</button>
                </div>
            </div>
        </div>

    </div><!-- /container -->

    <!-- Bottom navigation -->
    <nav class="bottom-nav">
        <button class="nav-btn" data-tab="debts">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
            Skulder
        </button>
        <button class="nav-btn active" data-tab="saldo">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            Saldo
        </button>
        <button class="nav-btn" data-tab="add">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
            Lägg till
        </button>
    </nav>
    <!-- Wire logged-in user into UI elements -->
    <script>
        (function () {
            const user = localStorage.getItem('saldo_user') || '';

            // Banners
            const swishBanner = document.getElementById('swishCurrentUser');
            if (swishBanner) swishBanner.textContent = user;

            const debtBanner = document.getElementById('debtCurrentUser');
            if (debtBanner) debtBanner.textContent = user;

            // Pre-select hidden meSelect so swish.js keeps working unchanged
            const meSelect = document.getElementById('meSelect');
            if (meSelect) {
                const opt = document.createElement('option');
                opt.value = user;
                opt.textContent = user;
                opt.selected = true;
                meSelect.appendChild(opt);
            }

            // Pre-select hidden debtTo so script.js keeps working unchanged
            const debtTo = document.getElementById('debtTo');
            if (debtTo) {
                const opt = document.createElement('option');
                opt.value = user;
                opt.textContent = user;
                opt.selected = true;
                debtTo.appendChild(opt);
            }

            // Remove logged-in user from debtFrom so you can't pick yourself
            const debtFrom = document.getElementById('debtFrom');
            if (debtFrom) {
                Array.from(debtFrom.options).forEach(o => {
                    if (o.value === user) o.remove();
                });
            }
        })();
    </script>

</body>
</html>
