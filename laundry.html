<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>BΩNG house — Tvätt</title>
    <link rel="icon" type="image/png" href="/images/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" sizes="any" />
    <link rel="shortcut icon" href="/images/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png" />
    <link rel="manifest" href="/images/site.webmanifest" />
    <link rel="stylesheet" href="styles.css">
    <script>
        if (!localStorage.getItem('saldo_user')) window.location.replace('login.html');
    </script>
    <style>
        /* ── Laundry badges ── */
        .laundry-badge {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 2px 8px;
            border-radius: 20px;
            flex-shrink: 0;
        }
        .laundry-badge-open {
            background: rgba(100, 180, 100, 0.18);
            color: #7ecb7e;
            border: 1px solid rgba(100, 180, 100, 0.35);
        }
        .laundry-badge-private {
            background: var(--accent-subtle);
            color: var(--text-muted);
            border: 1px solid var(--card-border);
        }
        .laundry-actions {
            display: flex;
            gap: 6px;
        }
        .laundry-join-btn {
            color: #7ecb7e !important;
            border-color: rgba(100,180,100,0.35) !important;
        }
        .laundry-join-btn:active,
        .laundry-join-btn:hover {
            background: rgba(100,180,100,0.12) !important;
            border-color: rgba(100,180,100,0.6) !important;
        }
        .laundry-delete-btn {
            color: var(--danger, #e05555) !important;
            border-color: rgba(224,85,85,0.35) !important;
        }
        .laundry-delete-btn:active,
        .laundry-delete-btn:hover {
            background: rgba(224,85,85,0.1) !important;
        }
        .entry-meta {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: var(--text-muted);
        }
        .entry-meta svg {
            stroke: var(--text-muted);
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <script type="module" src="laundry.js"></script>

    <header class="top-bar">
        <a href="index.html" class="back-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            Hem
        </a>
        <span class="top-bar-title">B<span>Ω</span>NG house</span>
        <div style="width:70px"></div>
    </header>

    <div class="container subpage-container">
        <div class="subpage-header">
            <h1 class="subpage-title">Tvätt</h1>
        </div>

        <!-- Booking form -->
        <form id="laundryForm" class="add-form active">
            <div class="form-field">
                <label class="field-label" for="laundryDate">Datum</label>
                <input class="field-input" type="date" id="laundryDate" name="laundryDate" required>
            </div>
            <div class="form-field">
                <label class="field-label" for="laundrySlot">Tid</label>
                <select id="laundrySlot" class="field-input" required>
                    <option value="" disabled selected>Välj tid</option>
                    <option value="07:00-14:00">07:00–14:00</option>
                    <option value="14:00-21:00">14:00–21:00</option>
                </select>
            </div>
            <div class="form-field">
                <label class="field-label" for="laundryOpen">Vem får använda tiden?</label>
                <select id="laundryOpen" class="field-input" required>
                    <option value="" disabled selected>Välj</option>
                    <option value="private">Bara jag</option>
                    <option value="open">Alla (öppen tid)</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary btn-submit">Boka</button>
        </form>

        <!-- Booked times list -->
        <div class="section-card entries-card">
            <div class="section-card-header">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/></svg>
                Bokade tider
            </div>
            <div id="laundryList" class="entries-list"></div>
            <p id="laundryEmpty" class="shopping-empty">
                Laddar tider...&#129321;
            </p>
        </div>
    </div>

    <!-- Shared app modal (used by modal.js instead of alert/confirm) -->
    <div id="appModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2 id="appModalTitle">Meddelande</h2>
            </div>
            <div class="modal-body">
                <p id="appModalMessage" style="color:var(--text-dim);font-size:14px;line-height:1.6;"></p>
            </div>
            <div class="modal-footer">
                <button id="appModalCancel" class="btn btn-secondary">Avbryt</button>
                <button id="appModalConfirm" class="btn btn-primary">OK</button>
            </div>
        </div>
    </div>

    <div id="portrait-lock">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
        <p>Rotera till stående läge</p>
    </div>
    <script>
        if (screen.orientation && screen.orientation.lock) screen.orientation.lock('portrait').catch(() => {});
    </script>
</body>
</html>
